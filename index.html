<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodori - Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=jetbrains-mono:100,100i,200,200i,300,300i,400,500,600,700" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="screen">
        <div class="workplace" id="workplace">

            <button class="btn-darkmode" id="btnDarkmode" title="Dark mode">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>

            <div class="timerdiv">
                <button class="btn-settings" id="btnSettings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>

                <div class="settings-panel" id="settingsPanel">
                    <div class="settings-title">pomodori settings</div>
                    <div class="settings-rows">
                        <div class="settings-row">
                            <label>pomodoro</label>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <input type="number" id="setPomo" min="1" max="99" value="25">
                                <span>min</span>
                            </div>
                        </div>
                        <div class="settings-row">
                            <label>short break</label>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <input type="number" id="setShort" min="1" max="99" value="5">
                                <span>min</span>
                            </div>
                        </div>
                        <div class="settings-row">
                            <label>long break</label>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <input type="number" id="setLong" min="1" max="99" value="15">
                                <span>min</span>
                            </div>
                        </div>
                        <div class="settings-row">
                            <label>volume</label>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <input type="range" id="setVolume" min="0" max="100" value="85">
                                <span id="volumeLabel">85%</span>
                            </div>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn-settings-cancel" id="btnSettingsCancel">cancel</button>
                        <button class="btn-settings-save" id="btnSettingsSave">save</button>
                    </div>
                </div>

                <div class="mode-tabs">
                    <button class="mode-btn active" data-mode="pomodoro">pomodoro</button>
                    <button class="mode-btn" data-mode="short">short break</button>
                    <button class="mode-btn" data-mode="long">long break</button>
                </div>

                <a href="https://github.com/ch-xedt/Pomodori" target="_blank"><div class="timer-label" id="timerLabel">focus</div></a>

                <div class="timer-display" id="timerDisplay">25:00</div>

                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="controls">
                    <button class="btn-reset" id="btnReset">reset</button>
                    <button class="btn-start" id="btnStart">start</button>
                </div>

                <div class="session-dots" id="sessionDots">
                    <div class="dot done"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

            </div>
        </div>
    </div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

  <script src="script.js"></script>

</body>
</html>
